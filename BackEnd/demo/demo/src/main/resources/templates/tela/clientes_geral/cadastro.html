<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>Cadastro de Clientes</title>
</head>
<body>

    <nav>
        <ul>
        	<h4 th:text="${cliente.id == null} ? 'Novo Cadastro' : 'Editando Cliente'"></h4>
            <li><a href="/tela/clientes_geral/cadastro">Novo Cadastro</a></li>
            <li><a href="/tela/home">Home</a></li>
        </ul>
    </nav>

    <main>
        <h1>Cadastro Geral de Clientes</h1>
        
        <form action="/salvarCliente" method="POST"> 
        	<div>
        		<label for="id">ID:</label>
        		<input type="text" id="id" name="id" th:value="${cliente?.id}" readonly>
   			</div>

            <div>
       			 <label for="nome">Nome:</label>
        		<input type="text" id="nome" name="nome" th:value="${cliente?.nome}" 
               placeholder="Digite o nome completo" required>
    		</div>

            <div>
        		<label for="cpf">CPF:</label>
        		<input type="text" id="cpf" name="cpf" th:value="${cliente?.cpf}" 
               	placeholder="000.000.000-00" required>
  		  </div>

            <div>
    			<label for="dataNascimento">Data de Nascimento:</label>
   			 	<input type="date" id="dataNascimento" name="dataNascimento" 
           		th:value="${cliente?.dataNascimento}">
			</div>

            <div>
   				 <label for="email">E-mail:</label>
   				 <input type="email" id="email" name="email" 
    		       th:value="${cliente?.email}" 
      		     placeholder="exemplo@email.com">
			</div>
			
            <div>
                <button type="submit">Confirmar e Salvar</button>
                <button type="button" onclick="limparFormulario()">Limpar Campos</button>
                
                <a th:if="${cliente.id != null}"
  					 th:href="@{/excluircliente/{id}(id=${cliente.id})}"
  					 onclick="return confirm('Tem certeza que deseja excluir este cadastro definitivamente?');">
 			   <button type="button">Excluir cadastro</button>
   			 
</a>
            </div>
            
        </form>
    </main>

<script>
//Limpando os campos deixando vazio. Mascara
    function limparFormulario() {    
        document.getElementById('nome').value = '';
        document.getElementById('cpf').value = '';
        document.getElementById('email').value = '';
        document.getElementById('dataNascimento').value = '';
        
    }
</script>


</body>
</html>
