
<p-toast></p-toast>
<p-confirmDialog [style]="{width: '50vw'}"></p-confirmDialog>

<h2> Consulta de Clientes</h2>

<div style="margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
  
  <label for="caixaBusca" style="font-weight: bold;">Pesquisar por Nome:</label>
  
  <input 
      id="caixaBusca"
      type="text" 
      pInputText 
      [(ngModel)]="termoBusca" 
      (keydown.enter)="pesquisar()"
      placeholder="Digite um nome..." 
      style="width: 300px;" />
  
  <p-button 
      label="Buscar" 
      icon="pi pi-search" 
      (click)="pesquisar()">
  </p-button>
  <div style="margin-top: 10px; display: flex; align-items: center; gap: 10px;">
    
    <label style="font-weight: bold;">Filtrar Aniversariante por mês:</label>

    <select [(ngModel)]="mesSelecionado" style="padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
        <option value="" disabled selected>Escolha o mês...</option>
        <option value="1">Janeiro</option>
        <option value="2">Fevereiro</option>
        <option value="3">Março</option>
        <option value="4">Abril</option>
        <option value="5">Maio</option>
        <option value="6">Junho</option>
        <option value="7">Julho</option>
        <option value="8">Agosto</option>
        <option value="9">Setembro</option>
        <option value="10">Outubro</option>
        <option value="11">Novembro</option>
        <option value="12">Dezembro</option>
    </select>

    <p-button 
        label="Filtrar Mês" 
        icon="pi pi-calendar" 
        (click)="pesquisarPorMes()" 
        styleClass="p-button-secondary"> </p-button>

</div>
</div>

<hr>

<div class="card">
<p-table [value]="clientes" [paginator]="true" [rows]="10" [rowsPerPageOptions]="[10, 20, 30]" [tableStyle]="{ 'min-width': '50rem' }">        
        <ng-template #header>
            <tr>
                <th>Nome</th>
                <th>CPF</th>
                <th>Data de Nascimento</th>
                <th>E-mail</th>
               <th style="width: 15rem; text-align: center;"></th>
            </tr>
        </ng-template>
        
        <ng-template #body let-cliente>
           <tr> 
                <td>{{ cliente.nome }}</td>
                <td>{{ cliente.cpf | cpf }}</td>
                <td>{{ cliente.dataNascimento | date : 'dd/MM/yyyy'}}</td>
                <td>{{ cliente.email }}</td>
                
                <td style="display: flex; gap: 5px; justify-content: center;">
                    <p-button 
                        label="Editar" 
                        icon="pi pi-pencil" 
                        styleClass="p-button-info p-button-sm"
                        (click)="editar(cliente)">
                    </p-button>
                    <p-button 
                        label="Excluir" 
                        icon="pi pi-trash" 
                        styleClass="p-button-danger p-button-sm"
                        (click)="excluir(cliente.id)"> 
                    </p-button>
                </td>
            </tr>


        </ng-template>

        <ng-template #emptymessage>
            <tr>
                <td colspan="4" style="text-align: center; color: gray;">
                    Nenhum cliente encontrado com esse nome.
                </td>
            </tr>
        </ng-template>
        
    </p-table>
</div>
